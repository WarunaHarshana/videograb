<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoGrab</title>
    <meta name="description" content="Download any video from any website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- Background glow effects -->
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>

        <div class="container">
            <!-- Header -->
            <header class="header">
                <div class="logo">
                    <span class="logo-icon">▶</span>
                    <div>
                        <h1>VideoGrab</h1>
                        <p class="tagline">Download any video from any website</p>
                    </div>
                </div>
                <div class="tools-status" id="toolsStatus"></div>
            </header>

            <!-- Input Section -->
            <section class="input-section">
                <div class="input-card">
                    <div class="url-group">
                        <label for="urlInput">Video URL</label>
                        <div class="url-row">
                            <div class="url-input-wrap">
                                <span class="url-icon" id="urlIcon">◉</span>
                                <input type="url" id="urlInput" placeholder="https://youtube.com/watch?v=..." autocomplete="off" spellcheck="false">
                                <span class="url-site" id="urlSite"></span>
                            </div>
                            <button class="btn btn-paste" id="pasteBtn" title="Paste from clipboard">📋</button>
                        </div>
                    </div>

                    <div class="path-group">
                        <label for="pathInput">Save to</label>
                        <div class="path-row">
                            <input type="text" id="pathInput" placeholder="Download folder path">
                            <button class="btn btn-folder" id="browseBtn" title="Browse for folder">📂</button>
                        </div>
                    </div>

                    <div class="options-row">
                        <div class="option-group">
                            <label for="formatSelect">Quality</label>
                            <select id="formatSelect">
                                <option value="best">Best</option>
                                <option value="1080">1080p</option>
                                <option value="720">720p</option>
                                <option value="480">480p</option>
                                <option value="audio">Audio only (MP3)</option>
                            </select>
                        </div>
                        <label class="cookie-toggle">
                            <input type="checkbox" id="cookieCheck">
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">Cookies from</span>
                            <select id="cookieBrowser" class="browser-select">
                                <option value="chrome">Chrome</option>
                                <option value="firefox">Firefox</option>
                                <option value="edge">Edge</option>
                                <option value="opera">Opera</option>
                                <option value="safari">Safari</option>
                                <option value="brave">Brave</option>
                                <option value="vivaldi">Vivaldi</option>
                            </select>
                        </label>
                    </div>

                    <div class="toggles-row">
                        <label class="cookie-toggle">
                            <input type="checkbox" id="subsCheck">
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">Subtitles</span>
                        </label>
                        <select id="subLangSelect" class="browser-select" style="display:none">
                            <option value="en">English</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                            <option value="de">German</option>
                            <option value="pt">Portuguese</option>
                            <option value="ja">Japanese</option>
                            <option value="ko">Korean</option>
                            <option value="zh">Chinese</option>
                            <option value="ru">Russian</option>
                            <option value="all">All languages</option>
                        </select>
                        <label class="cookie-toggle" title="Skip SSL certificate verification (use for sites with cert issues)">
                            <input type="checkbox" id="noCertCheck">
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">Skip SSL verify</span>
                        </label>
                        <label class="cookie-toggle" title="Download all videos in a playlist">
                            <input type="checkbox" id="playlistCheck">
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">Full playlist</span>
                        </label>
                    </div>

                    <div class="action-row">
                        <button class="btn btn-download" id="downloadBtn">
                            <span class="btn-icon">⬇</span>
                            Download
                        </button>
                    </div>
                </div>
            </section>

            <!-- Downloads Section -->
            <section class="downloads-section">
                <div class="section-header">
                    <h2>Downloads <span class="active-count" id="activeCount" style="display:none">0</span></h2>
                    <div class="header-actions">
                        <button class="btn btn-history" id="historyBtn" title="View history">History</button>
                        <button class="btn btn-clear" id="clearBtn">Clear done</button>
                    </div>
                </div>
                <div class="downloads-list" id="downloadsList">
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">⬇</div>
                        <p>Paste a video URL to get started</p>
                    </div>
                </div>
            </section>

            <!-- History Panel -->
            <section class="history-section" id="historySection" style="display:none">
                <div class="section-header">
                    <h2>History</h2>
                    <button class="btn btn-clear" id="closeHistoryBtn">Back</button>
                </div>
                <div class="history-list" id="historyList"></div>
            </section>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
