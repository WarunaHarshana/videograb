<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoGrab</title>
    <meta name="description" content="Download any video from any website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- Background glow effects -->
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>

        <div class="container">
            <!-- Header -->
            <header class="header">
                <div class="logo">
                    <span class="logo-icon">▶</span>
                    <div>
                        <h1>VideoGrab</h1>
                        <p class="tagline">Download any video from any website</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="tools-status" id="toolsStatus"></div>
                    <button class="btn btn-theme" id="themeBtn" title="Toggle theme">🌙</button>
                </div>
            </header>

            <!-- Input Section -->
            <section class="input-section">
                <div class="input-card">
                    <!-- URL Input -->
                    <div class="url-group">
                        <div class="url-label-row">
                            <label for="urlInput">Video URL</label>
                            <button class="btn btn-batch-toggle" id="batchToggle" title="Toggle batch mode">Batch</button>
                        </div>
                        <div class="url-row" id="singleUrlRow">
                            <div class="url-input-wrap">
                                <span class="url-icon" id="urlIcon">◉</span>
                                <input type="url" id="urlInput" placeholder="https://youtube.com/watch?v=..." autocomplete="off" spellcheck="false">
                                <span class="url-site" id="urlSite"></span>
                            </div>
                            <button class="btn btn-paste" id="pasteBtn" title="Paste from clipboard">📋</button>
                        </div>
                        <div class="url-row" id="batchUrlRow" style="display:none">
                            <textarea id="batchUrlInput" placeholder="Paste multiple URLs (one per line)..." rows="5" spellcheck="false"></textarea>
                        </div>
                    </div>

                    <!-- Save Path -->
                    <div class="path-group">
                        <label for="pathInput">Save to</label>
                        <div class="path-row">
                            <input type="text" id="pathInput" placeholder="Download folder path">
                            <button class="btn btn-folder" id="browseBtn" title="Browse for folder">📂</button>
                        </div>
                    </div>

                    <!-- Main Options Row -->
                    <div class="options-row">
                        <div class="option-group">
                            <label for="formatSelect">Quality</label>
                            <select id="formatSelect">
                                <option value="best">Best</option>
                                <option value="1080">1080p</option>
                                <option value="720">720p</option>
                                <option value="480">480p</option>
                                <option value="audio">Audio only (MP3)</option>
                            </select>
                        </div>
                        <label class="cookie-toggle">
                            <input type="checkbox" id="cookieCheck">
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">Cookies from</span>
                            <select id="cookieBrowser" class="browser-select">
                                <option value="chrome">Chrome</option>
                                <option value="firefox">Firefox</option>
                                <option value="edge">Edge</option>
                                <option value="opera">Opera</option>
                                <option value="safari">Safari</option>
                                <option value="brave">Brave</option>
                                <option value="vivaldi">Vivaldi</option>
                            </select>
                        </label>
                        <label class="cookie-toggle" title="Download all videos in a playlist">
                            <input type="checkbox" id="playlistCheck">
                            <span class="toggle-slider"></span>
                            <span class="toggle-label">Full playlist</span>
                        </label>
                    </div>

                    <!-- Advanced Settings (collapsible) -->
                    <div class="settings-toggle-row">
                        <button class="btn btn-settings-toggle" id="settingsToggle">
                            <span class="settings-arrow" id="settingsArrow">▶</span> Advanced options
                        </button>
                    </div>
                    <div class="settings-panel" id="settingsPanel" style="display:none">
                        <div class="settings-grid">
                            <div class="option-group">
                                <label for="outputFormatSelect">Output format</label>
                                <select id="outputFormatSelect">
                                    <option value="mp4">MP4</option>
                                    <option value="mkv">MKV</option>
                                    <option value="webm">WebM</option>
                                </select>
                            </div>
                            <div class="option-group">
                                <label for="speedLimitSelect">Speed limit</label>
                                <select id="speedLimitSelect">
                                    <option value="">Unlimited</option>
                                    <option value="500K">500 KB/s</option>
                                    <option value="1M">1 MB/s</option>
                                    <option value="2M">2 MB/s</option>
                                    <option value="5M">5 MB/s</option>
                                </select>
                            </div>
                            <div class="option-group">
                                <label for="subLangSelect">Subtitles</label>
                                <div class="sub-row">
                                    <label class="cookie-toggle compact">
                                        <input type="checkbox" id="subsCheck">
                                        <span class="toggle-slider"></span>
                                        <span class="toggle-label">On</span>
                                    </label>
                                    <select id="subLangSelect">
                                        <option value="en">English</option>
                                        <option value="es">Spanish</option>
                                        <option value="fr">French</option>
                                        <option value="de">German</option>
                                        <option value="pt">Portuguese</option>
                                        <option value="ja">Japanese</option>
                                        <option value="ko">Korean</option>
                                        <option value="zh">Chinese</option>
                                        <option value="ru">Russian</option>
                                        <option value="all">All</option>
                                    </select>
                                </div>
                            </div>
                            <div class="option-group">
                                <label for="proxyInput">Proxy</label>
                                <input type="text" id="proxyInput" placeholder="socks5://host:port" spellcheck="false">
                            </div>
                            <label class="cookie-toggle" title="Skip SSL certificate verification">
                                <input type="checkbox" id="noCertCheck">
                                <span class="toggle-slider"></span>
                                <span class="toggle-label">Skip SSL verify</span>
                            </label>
                        </div>
                    </div>

                    <!-- Download Button -->
                    <div class="action-row">
                        <button class="btn btn-download" id="downloadBtn">
                            <span class="btn-icon">⬇</span>
                            Download
                        </button>
                    </div>
                </div>
            </section>

            <!-- Downloads Section -->
            <section class="downloads-section">
                <div class="section-header">
                    <h2>Downloads <span class="active-count" id="activeCount" style="display:none">0</span></h2>
                    <div class="header-actions">
                        <button class="btn btn-history" id="historyBtn" title="View history (Ctrl+Shift+H)">History</button>
                        <button class="btn btn-clear" id="clearBtn">Clear done</button>
                    </div>
                </div>
                <div class="downloads-list" id="downloadsList">
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">⬇</div>
                        <p>Paste a video URL to get started</p>
                    </div>
                </div>
            </section>

            <!-- History Panel -->
            <section class="history-section" id="historySection" style="display:none">
                <div class="section-header">
                    <h2>History</h2>
                    <div class="header-actions">
                        <input type="text" id="historySearch" class="history-search" placeholder="Search...">
                        <button class="btn btn-export" id="exportHistoryBtn" title="Export history">Export</button>
                        <button class="btn btn-clear" id="closeHistoryBtn">Back</button>
                    </div>
                </div>
                <div class="history-list" id="historyList"></div>
            </section>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/app.js"></script>
</body>
</html>
